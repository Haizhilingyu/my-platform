name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Code Quality - Format Check
        working-directory: backend
        run: mvn spotless:check -q

      - name: Code Quality - Checkstyle
        working-directory: backend
        run: mvn checkstyle:check -q

      - name: Static Analysis - SpotBugs
        working-directory: backend
        run: mvn spotbugs:check -q

      - name: Unit Tests + Coverage Report
        working-directory: backend
        run: mvn test jacoco:report -B

      - name: Coverage Gate (≥ 80% lines)
        working-directory: backend
        run: mvn jacoco:check -B

      - name: Modulith Verify
        working-directory: backend
        run: mvn test -Dtest=ModulithVerificationTest -B

      - name: Package
        working-directory: backend
        run: mvn package -DskipTests -B -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/**/target/site/jacoco/

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/app/target/*.jar

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type Check
        working-directory: frontend
        run: npm run type-check

      - name: Lint
        working-directory: frontend
        run: npm run lint:check

      - name: Unit Tests + Coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
