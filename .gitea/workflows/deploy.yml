name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签'
        required: false
        default: 'latest'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            192.168.1.2:8082/platform-backend:${{ steps.tag.outputs.IMAGE_TAG }}
            192.168.1.2:8082/platform-backend:latest
          build-args: |
            NEXUS_USER=${{ secrets.NEXUS_USER }}
            NEXUS_PASS=${{ secrets.NEXUS_PASS }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          push: true
          tags: |
            192.168.1.2:8082/platform-frontend:${{ steps.tag.outputs.IMAGE_TAG }}
            192.168.1.2:8082/platform-frontend:latest

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.1.2
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          script: |
            cd /volume1/docker/my-platform
            export TAG=${{ steps.tag.outputs.IMAGE_TAG }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployed version: $TAG"
            docker compose ps
