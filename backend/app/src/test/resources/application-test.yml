# 测试环境配置：H2 内存数据库（PostgreSQL 兼容模式），无需任何外部依赖（无 PG / Redis 连接）。
#
# 关键设计点：
#   - MODE=PostgreSQL            使 H2 接受 PG 语法（BIGSERIAL / COMMENT ON / ON CONFLICT 之外的标准 DML）
#   - DATABASE_TO_LOWER=TRUE     H2 默认将未加引号标识符大写，PG 则小写；此选项让 H2 与 PG 一致
#   - CASE_INSENSITIVE_IDENTIFIERS=TRUE  宽容匹配标识符大小写，避免 validate 阶段歧义
#   - DB_CLOSE_DELAY=-1          JVM 生命周期内保持内存库存活（多连接 / 多 session 共享同一实例）
#   - ddl-auto=validate          schema 由 Flyway 管理；Hibernate 仅校验实体与表结构一致
#   - Redis host 指向 localhost   Lettuce 连接懒初始化，上下文启动不会真正连远端 <NAS_IP>
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
