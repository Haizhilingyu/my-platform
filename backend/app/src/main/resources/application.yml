spring:
  application:
    name: my-platform
  # Java 25 虚拟线程：Tomcat 请求线程 + @Async + 调度任务运行于虚拟线程，
  # 直接惠及 DeepSeek 阻塞调用 / SSE 流式 / logout-webhook 扇出（Spring Boot 4 + JDK 25）。
  threads:
    virtual:
      enabled: true

  datasource:
    # 凭证外部化：未设置环境变量时使用默认值（本地/容器内开发友好），
    # 生产/NAS 通过 SPRING_DATASOURCE_* 环境变量注入真实凭证（见 docker/docker-compose*.yml）。
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://<NAS_IP>:5532/platform}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: Asia/Shanghai
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-pg
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:<NAS_IP>}
      port: ${SPRING_DATA_REDIS_PORT:6380}
      # 凭证外部化：REDIS_PASSWORD 优先；兼容历史变量 SPRING_DATA_REDIS_PASSWORD。
      # 无密码则留空（本地开发）。生产/NAS 通过环境变量注入（见 docker/.env.example）。
      password: ${REDIS_PASSWORD:${SPRING_DATA_REDIS_PASSWORD:}}
      database: 0

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  mvc:
    # 让未知路径（无 controller + 无静态文件）抛出 NoHandlerFoundException，
    # 触发 ErrorController 处理（SpaErrorController 据此做 SPA fallback）。
    throw-exception-if-no-handler-found: true

  web:
    resources:
      # 静态资源位置：优先 jar 内嵌 classpath:/static/，其次容器外挂卷 file:/app/static/optional/
      # 后者支持不重新打 jar 更新前端（挂载卷覆盖）。
      static-locations: classpath:/static/,file:/app/static/optional/

  # Spring AI：不使用其任何自动装配的 OpenAi*Model（连接参数改由 sys_config 提供，见
  # DeepSeekChatModelFactory，仅构造 ChatModel）。排除全部 OpenAi 自动配置，避免空 api-key 时
  # audio/image/embedding/moderation 等 bean 强制校验 api-key 导致应用上下文启动崩溃。
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

server:
  port: 8090

app:
  security:
    jwt:
      # 密钥外部化：生产环境务必通过 APP_SECURITY_JWT_SECRET 注入随机密钥。
      secret: ${APP_SECURITY_JWT_SECRET:changeme-must-be-at-least-32-bytes-long-for-hs256}
      expiration: 86400000
  ai:
    # provider 默认 mock（关键词匹配，无 LLM）；生产置 deepseek 启用真实 LLM（APP_AI_PROVIDER=deepseek）
    rate-limit:
      max-requests: 30   # 每用户每窗口最大对话次数；<=0 关闭限流
      window-seconds: 60

# LDAP 登录（默认关闭；显式置 PLATFORM_LOGIN_LDAP_ENABLED=true 启用，对接 OpenLDAP <NAS_IP>:389）
platform:
  login:
    ldap:
      enabled: ${PLATFORM_LOGIN_LDAP_ENABLED:false}
      url: ${PLATFORM_LOGIN_LDAP_URL:ldap://<NAS_IP>:389}
      user-dn-pattern: ${PLATFORM_LOGIN_LDAP_USER_DN_PATTERN:uid={0},dc=devenv,dc=local}
      auto-create-user: ${PLATFORM_LOGIN_LDAP_AUTO_CREATE_USER:true}
      default-role-code: ${PLATFORM_LOGIN_LDAP_DEFAULT_ROLE_CODE:user}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
