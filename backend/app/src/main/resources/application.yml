spring:
  application:
    name: my-platform

  datasource:
    # 凭证外部化：未设置环境变量时使用默认值（本地/容器内开发友好），
    # 生产/NAS 通过 SPRING_DATASOURCE_* 环境变量注入真实凭证（见 docker/docker-compose*.yml）。
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://192.168.1.2:5532/platform}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: Asia/Shanghai
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:192.168.1.2}
      port: ${SPRING_DATA_REDIS_PORT:6380}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: 0

server:
  port: 8090

app:
  security:
    jwt:
      # 密钥外部化：生产环境务必通过 APP_SECURITY_JWT_SECRET 注入随机密钥。
      secret: ${APP_SECURITY_JWT_SECRET:my-platform-secret-key-must-be-at-least-32-bytes-long-for-hs256}
      expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
