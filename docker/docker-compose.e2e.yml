# E2E 本地启动专用 override —— 复用本地镜像，禁止 Docker Hub 拉取（避免内网/沙箱网络卡住）。
# 用法: docker compose -f docker-compose.local.yml -f docker-compose.e2e.yml up -d
# 或独立使用（本文件已自包含）: docker compose -f docker-compose.e2e.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    pull_policy: never
    container_name: my-platform-db-e2e
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@2025
    ports:
      - "5533:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    pull_policy: never
    container_name: my-platform-redis-e2e
    ports:
      - "6381:6379"

  app:
    image: docker-app:latest
    pull_policy: never
    container_name: my-platform-app-e2e
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Postgres@2025
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_SECURITY_JWT_SECRET: my-platform-secret-key-must-be-at-least-32-bytes-long-for-hs256
    ports:
      - "8090:8090"
