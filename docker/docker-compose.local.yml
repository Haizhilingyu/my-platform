services:
  postgres:
    image: postgres:16-alpine
    container_name: my-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@2025
    ports:
      - "5533:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: my-platform-redis
    restart: unless-stopped
    ports:
      - "6381:6379"

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.local
    container_name: my-platform-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Postgres@2025
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_SECURITY_JWT_SECRET: my-platform-secret-key-must-be-at-least-32-bytes-long-for-hs256
      SERVER_PORT: 8090
    ports:
      - "8090:8090"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend-local
    container_name: my-platform-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  pgdata:
